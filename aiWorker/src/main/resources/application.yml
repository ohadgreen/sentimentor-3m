server:
  port: 8082

spring:
  application:
    name: aiWorker
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: ${OPENAI_CHAT_MODEL:gpt-5-nano}
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
    user: ${ACTIVEMQ_USER:admin}
    password: ${ACTIVEMQ_PASSWORD:admin}

jms:
  queues:
    analysis-request: sentiment.analysis.request
    analysis-response: sentiment.analysis.response
  listener:
    concurrency: 1-5

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: ${spring.application.name}